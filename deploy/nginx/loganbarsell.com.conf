# Example nginx site config for loganbarsell.com
# Merge the /api/ location into your existing HTTPS server block.
# Keep /api/ ABOVE the SPA try_files fallback.

server {
  listen 80;
  listen [::]:80;
  server_name loganbarsell.com www.loganbarsell.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name loganbarsell.com www.loganbarsell.com;

  # TLS certificates managed by your existing setup (e.g. Certbot).
  # ssl_certificate     /etc/letsencrypt/live/loganbarsell.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/loganbarsell.com/privkey.pem;

  root /var/www/loganbarsell.com/build;
  index index.html;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
