name: Build & Deploy

on:
  push:
    branches: [ "main" ]
    

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - name: Deploy NodeJS app
      uses: appleboy/ssh-action@v0.1.2
      with:
        host: ${{secrets.SSH_HOST}}
        key: ${{secrets.SSH_KEY}}
        username: ${{secrets.SSH_USERNAME}}
        script_stop: true
        script: |
          cd /var/www/loganbarsell.com
          git pull
          npm ci
          npm run build
          systemctl reload nginx
