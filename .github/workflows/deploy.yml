name: Build & Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy NodeJS app
      uses: appleboy/ssh-action@v0.1.2
      with:
        host: ${{secrets.SSH_HOST}}
        key: ${{secrets.SSH_KEY}}
        username: ${{secrets.SSH_USERNAME}}
        script_stop: true
        script: |
          set -euo pipefail
          cd /var/www/loganbarsell.com
          git pull
          npm ci
          npm run build
          cd server
          npm ci --omit=dev
          cd ..
          if systemctl cat loganb-api.service >/dev/null 2>&1; then
            systemctl restart loganb-api
            sleep 2
            curl -fsS http://127.0.0.1:3001/api/health >/dev/null
          else
            echo "loganb-api.service not installed yet; skip API restart"
          fi
          nginx -t
          systemctl reload nginx
